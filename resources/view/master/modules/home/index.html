<h1 class="mt-4">Dashboard Master</h1>
<ol class="breadcrumb mb-4">
	<li class="breadcrumb-item active">Visão geral das escolas assinantes</li>
</ol>

<div class="row g-3 mb-4">
	<div class="col-md-4">
		<div class="card border-primary shadow-sm">
			<div class="card-body">
				<div class="text-muted small">Total de escolas</div>
				<div class="fs-2 fw-bold" id="master-total">{{total}}</div>
			</div>
		</div>
	</div>
	<div class="col-md-4">
		<div class="card border-success shadow-sm">
			<div class="card-body">
				<div class="text-muted small">Ativas</div>
				<div class="fs-2 fw-bold text-success" id="master-ativas">{{ativas}}</div>
			</div>
		</div>
	</div>
	<div class="col-md-4">
		<div class="card border-secondary shadow-sm">
			<div class="card-body">
				<div class="text-muted small">Inativas</div>
				<div class="fs-2 fw-bold text-secondary" id="master-inativas">{{inativas}}</div>
			</div>
		</div>
	</div>
</div>

<div class="card shadow-sm">
	<div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
		<div>
			<strong>Gerenciar escolas</strong>
			<div class="small text-muted">Cadastre escolas e libere módulos do plano.</div>
		</div>
		<a href="{{URL}}/master/escolas" class="btn btn-primary btn-sm">
			<i class="fas fa-school"></i> Ir para Escolas
		</a>
	</div>
</div>
