<h1 class="mt-4">Campanhas de E-mail</h1>
<ol class="breadcrumb mb-4">
	<li class="breadcrumb-item active">Envio em massa com fila</li>
</ol>

<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
	<button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalCampanha">
		<i class="fas fa-plus"></i> Nova campanha
	</button>
	<button type="button" class="btn btn-outline-secondary btn-sm" id="btn-processar-fila">
		<i class="fas fa-play"></i> Processar fila agora
	</button>
</div>

<div class="alert alert-info small">
	<strong>Variáveis na mensagem:</strong> <code>{nome}</code>, <code>{email}</code>, <code>{curso}</code>, <code>{escola}</code>.
	Os envios respeitam o limite e o intervalo definidos em <a href="{{URL}}/painel/config/comunicacao">Configurações → Comunicação</a>.
</div>

<div class="card shadow-sm">
	<div class="card-body p-0">
		<div class="table-responsive">
			<table class="table table-hover mb-0" id="tabela-campanhas">
				<thead class="table-light">
					<tr>
						<th>Título</th>
						<th>Status</th>
						<th>Progresso</th>
						<th>Criada em</th>
						<th class="text-end">Ações</th>
					</tr>
				</thead>
				<tbody id="lista-campanhas">
					<tr><td colspan="5" class="text-center text-muted py-4">Carregando...</td></tr>
				</tbody>
			</table>
		</div>
	</div>
</div>

<!-- Modal Nova/Editar Campanha -->
<div class="modal fade" id="modalCampanha" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="titulo-modal-campanha">Nova campanha</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body">
				<form id="form-campanha" onsubmit="return false;">
					<input type="hidden" id="campanha_id" value="">

					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label" for="campanha_titulo">Título interno *</label>
							<input type="text" class="form-control" id="campanha_titulo" required>
						</div>
						<div class="col-md-6">
							<label class="form-label" for="campanha_assunto">Assunto do e-mail *</label>
							<input type="text" class="form-control" id="campanha_assunto" required>
						</div>
						<div class="col-md-6">
							<label class="form-label" for="segmento_tipo">Público</label>
							<select class="form-control" id="segmento_tipo">
								<option value="alunos_matriculados">Alunos matriculados (ativos)</option>
								<option value="ex_alunos">Ex-alunos</option>
								<option value="aniversariantes_mes">Aniversariantes do mês</option>
								<option value="leads">Leads do CRM</option>
								<option value="inadimplentes">Inadimplentes (mensalidades em atraso)</option>
							</select>
						</div>
						<div class="col-md-6" id="wrap-status-lead" style="display:none;">
							<label class="form-label" for="status_lead">Status do lead</label>
							<select class="form-control" id="status_lead">
								<option value="">Todos</option>
								<option value="novo">Novo</option>
								<option value="em_atendimento">Em atendimento</option>
								<option value="matriculado">Matriculado</option>
								<option value="perdido">Perdido</option>
							</select>
						</div>
						<div class="col-12">
							<label class="form-label" for="campanha_mensagem">Mensagem (HTML simples) *</label>
							<textarea class="form-control" id="campanha_mensagem" rows="8" required placeholder="Olá {nome}, ..."></textarea>
						</div>
						<div class="col-12">
							<button type="button" class="btn btn-outline-secondary btn-sm" id="btn-preview-campanha">
								<i class="fas fa-users"></i> Pré-visualizar público
							</button>
							<span class="small text-muted ms-2" id="preview-resultado"></span>
						</div>
					</div>
				</form>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
				<button type="button" class="btn btn-primary" id="btn-salvar-campanha">
					<i class="fas fa-save"></i> Salvar rascunho
				</button>
			</div>
		</div>
	</div>
</div>

<!-- Modal Detalhes -->
<div class="modal fade" id="modalDetalhesCampanha" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">Detalhes da campanha</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body" id="body-detalhes-campanha"></div>
		</div>
	</div>
</div>

<script src="{{URL}}/resources/js/campanhas.js?v=20260715a"></script>
