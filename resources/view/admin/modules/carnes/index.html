<h1 class="mt-4">Carnês Gerados</h1>

<hr>

<div class="card shadow mb-4">
	<div id="listar"></div>

	<nav class="container">
		<ul class="pagination">
			<div id="pagination">
			</div>	
		</ul>
	</nav>
	
</div>

<!-- Modal formulario -->
<div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-xl">
		<div class="modal-content">
			<div id="listar-dados">
			</div>
		</div>
	</div>
</div>
 
<!-- Modal Baixa -->
<div class="modal fade" id="modalDarBaixa" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">
			<div id="body_dar_baixa"></div>
		</div>
	</div>
</div>

<!-- Modal Pagamento Carrinho -->
<div class="modal fade" id="modalCarrinhoPagamento" tabindex="-1" aria-labelledby="modalCarrinhoLabel" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">
			<div id="body_carrinho_pagamento"></div>
		</div>
	</div>
</div>

<!-- Card flutuante do carrinho -->
<div id="caixa-carrinho-widget" class="carrinho-widget d-none">
	<div class="carrinho-toggle" onclick="toggleCarrinhoDetalhes()">
		<div>
			<strong>Carrinho</strong><br>
			<small><span id="carrinho-qtd">0</span> itens</small>
		</div>
		<div class="text-end">
			<small>Total</small><br>
			<strong id="carrinho-total">R$ 0,00</strong>
		</div>
	</div>
	<div id="carrinho-detalhes" class="carrinho-detalhes d-none">
		<ul id="carrinho-itens" class="list-group list-group-flush mb-2"></ul>

		<form id="form-carrinho-add-avulso" class="mt-2">
			<div class="mb-1">
				<input type="text" name="descricao" class="form-control form-control-sm" placeholder="Descrição serviço/produto">
			</div>
			<div class="mb-1">
				<input type="text" name="valor" class="form-control form-control-sm" placeholder="Valor">
			</div>
			<button type="submit" class="btn btn-sm btn-outline-primary w-100">Adicionar item avulso</button>
			<div id="response-carrinho-avulso" class="mt-1"></div>
		</form>

		<button type="button" class="btn btn-sm btn-primary w-100 mt-2" onclick="abrirPagamentoCarrinho()">
			Finalizar pagamento
		</button>
	</div>
</div>

<style>
.carrinho-widget{
	position: fixed;
	right: 20px;
	bottom: 20px;
	z-index: 1050;
	min-width: 260px;
	max-width: 320px;
	background: #ffffff;
	border-radius: 0.75rem;
	box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
	border: 1px solid rgba(0,0,0,0.08);
	overflow: hidden;
}
.carrinho-toggle{
	cursor: pointer;
	padding: 0.75rem 0.9rem;
	display: flex;
	justify-content: space-between;
	align-items: center;
	background: linear-gradient(135deg,#0d6efd,#4dabf7);
	color: #fff;
}
.carrinho-detalhes{
	background: #fff;
	max-height: 340px;
	overflow-y: auto;
	padding: 0.5rem 0.75rem 0.75rem;
}
</style>

	let rotaCarrinhoAddAvulso   = 'painel/caixa/carrinho/add-avulso';
	let rotaCarrinhoRemove      = 'painel/caixa/carrinho/remove';
	let rotaCarrinhoForm        = 'painel/caixa/carrinho/form';
	let rotaCarrinhoFinalizar   = 'painel/caixa/carrinho/finalizar';

</script>
