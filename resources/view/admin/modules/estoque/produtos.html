<h1 class="mt-4">Estoque</h1>
<ol class="breadcrumb mb-4">
	<li class="breadcrumb-item"><a href="{{URL}}/painel">Início</a></li>
	<li class="breadcrumb-item active">Produtos</li>
</ol>

<div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">

		<input type="search" id="stq-busca" class="form-control" placeholder="Buscar nome ou SKU…" data-anti-autofill autocomplete="off">

	</div>
	<div class="d-flex gap-2 flex-wrap">

		</button>
		<button type="button" id="btn-novo-prod" class="btn btn-sm btn-primary">

			<i class="fa-solid fa-cash-register"></i> Ir ao PDV
		</a>

		<div class="table-responsive">
			<table class="table table-hover mb-0 align-middle">
				<thead class="table-light">
					<tr>
						<th>Produto</th>
						<th>SKU</th>
						<th>Categoria</th>
						<th class="text-end">Estoque</th>

						<th class="text-end">Venda</th>

				</thead>
				<tbody id="stq-tbody">
					<tr><td colspan="7" class="text-muted p-3">Carregando…</td></tr>
				</tbody>
			</table>
