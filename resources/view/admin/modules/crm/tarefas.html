<h1 class="mt-4">CRM - Tarefas</h1>
<ol class="breadcrumb mb-4">
	<li class="breadcrumb-item active">Quadro de rotinas</li>
</ol>

<div class="d-flex justify-content-between align-items-center mb-3">
	<p class="text-muted small mb-0">Organize rotinas e campanhas em colunas, como no Trello.</p>
	<button type="button" class="btn btn-primary btn-sm" id="btn-nova-lista">
		<i class="fas fa-plus"></i> Adicionar Nova Lista
	</button>
</div>

<div class="trello-board-wrapper">
	<div class="trello-board" id="trello-board"></div>
</div>

<!-- Modal Nova Lista -->
<div class="modal fade" id="modalNovaLista" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-sm">
		<div class="modal-content">
			<form id="form-nova-lista">
				<div class="modal-header py-2">
					<h5 class="modal-title">Nova lista</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body py-2">
					<div id="response-nova-lista"></div>
					<label class="form-label small mb-1">Título da coluna</label>
					<input type="text" name="titulo" class="form-control form-control-sm" placeholder="Ex: Geral, Campanhas, Segunda..." required>
				</div>
				<div class="modal-footer py-2">
					<button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
					<button type="submit" class="btn btn-primary btn-sm">Criar lista</button>
				</div>
			</form>
		</div>
	</div>
</div>

<!-- Modal Novo Cartão (rápido) -->
<div class="modal fade" id="modalNovoCartao" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-sm">
		<div class="modal-content">
			<form id="form-novo-cartao">
				<div class="modal-header py-2">
					<h5 class="modal-title">Novo cartão</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body py-2">
					<div id="response-novo-cartao"></div>
					<input type="hidden" name="lista_id" id="novo-cartao-lista-id" value="">
					<label class="form-label small mb-1">Título da tarefa</label>
					<input type="text" name="titulo" class="form-control form-control-sm" placeholder="O que precisa ser feito?" required>
				</div>
				<div class="modal-footer py-2">
					<button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
					<button type="submit" class="btn btn-primary btn-sm">Adicionar</button>
				</div>
			</form>
		</div>
	</div>
</div>

<!-- Modal Detalhes do Cartão -->
<div class="modal fade" id="modalDetalhesCartao" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-xl">
		<div class="modal-content">
			<div class="modal-header py-2 border-0">
				<div class="flex-grow-1">
					<input type="text" id="detalhe-cartao-titulo" class="form-control form-control-lg border-0 fw-bold px-0" placeholder="Título da tarefa">
					<small class="text-muted" id="detalhe-cartao-data"></small>
				</div>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body pt-0">
				<div id="response-detalhe-cartao"></div>
				<input type="hidden" id="detalhe-cartao-id" value="">

				<div class="row g-3">
					<div class="col-lg-8">
						<div class="mb-3">
							<label class="form-label small fw-semibold">
								<i class="fas fa-align-left text-muted me-1"></i> Descrição detalhada
							</label>
							<textarea id="detalhe-cartao-descricao" class="form-control" rows="5" placeholder="Adicione mais detalhes sobre esta tarefa..."></textarea>
							<small class="text-muted">Salva automaticamente ao sair do campo.</small>
						</div>

						<div class="mb-3">
							<div class="d-flex justify-content-between align-items-center mb-2">
								<label class="form-label small fw-semibold mb-0">
									<i class="fas fa-list-check text-muted me-1"></i> Checklist
								</label>
								<small class="text-muted" id="checklist-progresso-texto">0%</small>
							</div>
							<div class="progress mb-2" style="height: 8px;">
								<div class="progress-bar bg-success" id="checklist-progresso-barra" role="progressbar" style="width: 0%"></div>
							</div>
							<div id="checklist-itens" class="mb-2"></div>
							<form id="form-checklist-item" class="d-flex gap-2">
								<input type="hidden" name="cartao_id" id="checklist-cartao-id" value="">
								<input type="text" name="item_texto" id="checklist-novo-item" class="form-control form-control-sm" placeholder="Adicionar item...">
								<button type="submit" class="btn btn-outline-primary btn-sm text-nowrap">Adicionar</button>
							</form>
						</div>

						<div class="d-flex gap-2">
							<button type="button" class="btn btn-outline-danger btn-sm" id="btn-excluir-cartao">
								<i class="fas fa-trash"></i> Excluir cartão
							</button>
						</div>
					</div>

					<div class="col-lg-4">
						<div class="tarefa-sidebar">
							<h6 class="small fw-semibold text-muted mb-3">
								<i class="fas fa-comments me-1"></i> Comentários
							</h6>
							<div id="detalhe-comentarios" class="tarefa-comentarios-list mb-3"></div>
							<form id="form-comentario-tarefa">
								<input type="hidden" name="cartao_id" id="comentario-cartao-id" value="">
								<textarea name="comentario" id="comentario-texto" class="form-control form-control-sm mb-2" rows="3" placeholder="Escreva um comentário..."></textarea>
								<button type="submit" class="btn btn-primary btn-sm w-100">Comentar</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<style>
.trello-board-wrapper {
	overflow-x: auto;
	padding-bottom: 1rem;
}
.trello-board {
	display: flex;
	gap: 0.75rem;
	align-items: flex-start;
	min-height: 480px;
}
.trello-coluna {
	flex: 0 0 280px;
	max-width: 280px;
	background: #f1f3f5;
	border-radius: 0.5rem;
	padding: 0.5rem;
}
.trello-coluna-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 0.35rem 0.5rem;
	margin-bottom: 0.5rem;
}
.trello-coluna-titulo {
	font-weight: 600;
	font-size: 0.9rem;
	border: none;
	background: transparent;
	width: 100%;
	padding: 0;
}
.trello-coluna-titulo:focus {
	outline: none;
	background: rgba(255,255,255,0.6);
	border-radius: 0.25rem;
}
.trello-list-cards {
	min-height: 20px;
}
.trello-card {
	cursor: pointer;
	background: #fff;
	border-radius: 0.4rem;
	padding: 0.55rem 0.65rem;
	margin-bottom: 0.45rem;
	box-shadow: 0 1px 2px rgba(0,0,0,0.08);
	border: 1px solid rgba(0,0,0,0.05);
	transition: box-shadow 0.15s ease;
}
.trello-card:hover {
	box-shadow: 0 3px 8px rgba(0,0,0,0.12);
}
.trello-card.sortable-drag { cursor: grabbing; }
.trello-card-titulo {
	font-size: 0.88rem;
	font-weight: 500;
	line-height: 1.3;
}
.trello-card-meta {
	font-size: 0.72rem;
	color: #6c757d;
	margin-top: 0.25rem;
}
.trello-card-badge {
	display: inline-flex;
	align-items: center;
	gap: 0.2rem;
	font-size: 0.7rem;
	color: #198754;
	background: #e8f5e9;
	padding: 0.1rem 0.35rem;
	border-radius: 0.25rem;
	margin-top: 0.3rem;
}
.trello-btn-add-card {
	width: 100%;
	text-align: left;
	border: none;
	background: transparent;
	color: #6c757d;
	font-size: 0.82rem;
	padding: 0.35rem 0.5rem;
	border-radius: 0.35rem;
}
.trello-btn-add-card:hover {
	background: rgba(0,0,0,0.06);
	color: #495057;
}
.trello-ghost { opacity: 0.4; background: #dee2e6; }
.tarefa-sidebar {
	background: #f8f9fa;
	border-radius: 0.5rem;
	padding: 1rem;
	border: 1px solid rgba(0,0,0,0.06);
}
.tarefa-comentarios-list {
	max-height: 320px;
	overflow-y: auto;
}
.tarefa-comentario-item {
	background: #fff;
	border-radius: 0.4rem;
	padding: 0.6rem 0.75rem;
	margin-bottom: 0.5rem;
	border: 1px solid rgba(0,0,0,0.06);
}
.checklist-item {
	display: flex;
	align-items: flex-start;
	gap: 0.5rem;
	padding: 0.35rem 0;
	border-bottom: 1px solid rgba(0,0,0,0.04);
}
.checklist-item:last-child { border-bottom: none; }
.checklist-item label {
	flex: 1;
	font-size: 0.88rem;
	margin-bottom: 0;
	cursor: pointer;
}
.checklist-item.concluido label {
	text-decoration: line-through;
	color: #6c757d;
}
.checklist-item .btn-excluir-item {
	opacity: 0;
	padding: 0;
	border: none;
	background: none;
	color: #dc3545;
	font-size: 0.75rem;
}
.checklist-item:hover .btn-excluir-item { opacity: 1; }
</style>

	let salvarCartao         = 'painel/crm/tarefas/cartao/save';

	let posicaoCartao        = 'painel/crm/tarefas/cartao/posicao';
