<script>
	let listagem = 'painel/caixa/entrada';
	let formulario = 'painel/caixa/entrada/form';
	let edicao = 'painel/caixa/entrada/save';
</script>
<script src="{{URL}}/resources/js/ajax.js"></script>

<script>

 	// CHAMA A FUNÇÃO LISTAR AO CARREGAR A PAGINA
	$(document).ready(function(){
		listar('hoje',1);

	})
 	// FUNÇÃO LITSAR MOVIMENTAÇÃ CAIXA
	function listar(filtro=null,page=1) {

		$.ajax({
			url: url_base+listagem,
			method: "post",
			data: {filtro,page},
			dataType: "json",
			success: function(result){

				$('#listar').html(result.itens);
				$('#pagination').html(result.pagination);

				$('#fil-hoje').removeClass('active')
				$('#fil-semana').removeClass('active')
				$('#fil-mes').removeClass('active')
				$('#fil-atraso').removeClass('active')

				if(filtro == ''){
					$('#fil-hoje').addClass('active')
				} else if(filtro == 'hoje'){
					$('#fil-hoje').addClass('active')
				} else if(filtro == 'semana'){
					$('#fil-semana').addClass('active')
				} else if(filtro == 'mes'){
					$('#fil-mes').addClass('active')
				} else if(filtro == 'atraso'){
					$('#fil-atraso').addClass('active')
				} else {
					$('#fil-hoje').addClass('active')
				}


			},

		})
	}
</script>
